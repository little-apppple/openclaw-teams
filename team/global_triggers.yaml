# 全局触发器配置

## 系统级触发器

### 1. 每日团队晨会
- **类型**: cron
- **时间**: 每天 9:00
- **触发者**: 系统
- **参与者**: 所有 Agent
- **议程**:
  - 各 Agent 汇报今日计划
  - 协调跨部门任务
  - CEO 布置重点工作

### 2. 每周团队例会
- **类型**: cron
- **时间**: 每周五 15:00
- **触发者**: 系统
- **参与者**: 所有 Agent
- **议程**:
  - 各 Agent 汇报周报
  - 汇总周工作成果
  - 制定下周计划

### 3. 月度总结会议
- **类型**: cron
- **时间**: 每月最后一周周五 14:00
- **触发者**: 系统
- **参与者**: 所有 Agent
- **议程**:
  - 总结月度工作
  - 评估目标完成情况
  - 制定下月计划

## 事件触发器

### 4. 新需求处理流程
- **类型**: on_message
- **触发**: Product Manager 发布新需求
- **流程**:
  1. Product Manager 发布需求
  2. Solution Architect 响应并制定方案
  3. Finance Manager 评估成本
  4. Operations Manager 评估运营影响
  5. CEO 最终决策

### 5. 紧急事项响应
- **类型**: webhook
- **触发**: 收到紧急事件通知
- **流程**:
  1. CEO 收到通知
  2. 相关 Agent 快速响应
  3. 协调资源处理
  4. 事后复盘总结

## 监控触发器

### 6. 系统健康检查
- **类型**: interval
- **间隔**: 1小时
- **检查项**:
  - 各 Agent 运行状态
  - 任务执行进度
  - 异常情况预警

### 7. 数据备份检查
- **类型**: cron
- **时间**: 每天 23:00
- **动作**:
  - 检查数据备份状态
  - 验证备份完整性
  - 记录备份日志

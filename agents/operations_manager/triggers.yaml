# 运营经理 Agent 触发器配置

## 自动触发任务

### 1. 内容发布 (Content Publishing)
- **类型**: cron
- **时间**: 每天 9:00, 12:00, 18:00
- **动作**:
  - 按内容日历发布内容
  - 检查待发布内容状态
  - 确保内容格式符合平台要求

### 2. 数据日报 (Daily Report)
- **类型**: cron
- **时间**: 每天 18:00
- **动作**:
  - 统计各平台今日数据
  - 生成运营日报
  - 发布到 Plaza

### 3. 热点追踪 (Hot Topic Tracking)
- **类型**: interval
- **间隔**: 30分钟
- **动作**:
  - 扫描行业热点
  - 评估热点借势可行性
  - 快速产出借势内容（若可行）

### 4. 用户互动 (User Engagement)
- **类型**: cron
- **时间**: 每天 10:00, 15:00, 20:00
- **动作**:
  - 检查新留言和私信
  - 及时回复用户
  - 收集用户反馈

### 5. 周报汇总 (Weekly Summary)
- **类型**: cron
- **时间**: 每周五 16:00
- **动作**:
  - 汇总本周运营数据
  - 分析内容表现
  - 制定下周运营计划

### 6. 竞品分析 (Competitor Analysis)
- **类型**: cron
- **时间**: 每周一 10:00
- **动作**:
  - 监控竞品账号动态
  - 分析竞品内容策略
  - 输出竞品分析报告

## 手动触发
- CEO 可直接布置运营任务
- 产品经理可提出内容配合需求
- 突发事件可触发紧急响应

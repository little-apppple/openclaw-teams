# 财务 Agent 触发器配置

## 自动触发任务

### 1. 日常账务处理 (Daily Bookkeeping)
- **类型**: cron
- **时间**: 每天 17:00
- **动作**:
  - 整理当日收支凭证
  - 录入记账系统
  - 核对银行流水
  - 检查收支异常

### 2. 资金检查 (Cash Check)
- **类型**: interval
- **间隔**: 2小时
- **动作**:
  - 检查银行账户余额
  - 监控大额资金变动
  - 预警资金异常

### 3. 发票管理 (Invoice Management)
- **类型**: cron
- **时间**: 每天 9:30
- **动作**:
  - 接收和验证发票
  - 整理发票台账
  - 跟进发票认证

### 4. 月度结账 (Monthly Closing)
- **类型**: cron
- **时间**: 每月最后一天 20:00
- **动作**:
  - 完成当月所有凭证
  - 核对银行对账单
  - 结转损益
  - 生成财务报表

### 5. 税务申报 (Tax Filing)
- **类型**: cron
- **时间**: 每月 15 日（如为节假日顺延）
- **动作**:
  - 增值税申报
  - 企业所得税预缴
  - 其他税种申报
  - 税费缴纳

### 6. 财务报表 (Financial Report)
- **类型**: cron
- **时间**: 每月 5 日前
- **动作**:
  - 编制月度财务报表
  - 财务分析报告
  - 提交 CEO 审阅

### 7. 预算执行分析 (Budget Analysis)
- **类型**: cron
- **时间**: 每周一 09:00
- **动作**:
  - 分析预算执行情况
  - 预警超预算项目
  - 提出改进建议

### 8. 工资核算 (Payroll)
- **类型**: cron
- **时间**: 每月 25 日
- **动作**:
  - 核算员工工资
  - 代扣代缴个税
  - 生成工资条

## 手动触发
- CEO 可发起财务查询请求
- 运营经理可提交费用报销
- 紧急付款需求可触发快速审批

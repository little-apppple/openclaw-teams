# 方案架构师 Agent 触发器配置

## 自动触发任务

### 1. 方案设计 (Solution Design)
- **类型**: on_message
- **触发**: 收到产品经理发来的需求
- **动作**:
  - 分析需求文档
  - 设计技术方案
  - 评估可行性和风险
  - 输出方案设计文档

### 2. 技术调研 (Tech Research)
- **类型**: cron
- **时间**: 每周三 10:00
- **动作**:
  - 调研新技术趋势
  - 评估现有技术栈升级
  - 整理技术调研报告

### 3. 架构优化 (Architecture Optimization)
- **类型**: cron
- **时间**: 每月 15 日 14:00
- **动作**:
  - 检查系统性能指标
  - 识别架构瓶颈
  - 制定优化方案

### 4. 技术方案评审 (Solution Review)
- **类型**: on_message
- **触发**: 收到方案评审请求
- **动作**:
  - 评审技术方案
  - 提出改进建议
  - 输出评审意见

## 手动触发
- 产品经理可发送需求进行方案设计
- CEO 可发起技术调研任务
- 紧急技术问题可触发快速响应

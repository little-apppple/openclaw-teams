# 方案架构师 Agent 触发器配置

## 自动触发任务

### 1. 市场扫描 (Market Scan)
- **类型**: cron
- **时间**: 每天 10:00
- **动作**:
  - 扫描行业最新动态
  - 收集竞品信息
  - 发现新的市场需求
  - 整理发布到 Plaza

### 2. 需求评审 (Requirement Review)
- **类型**: cron
- **时间**: 每周二 14:00
- **动作**:
  - 评审新收集的需求
  - 评估需求价值和可行性
  - 确定需求优先级
  - 分配给相关 Agent

### 3. 产品迭代计划 (Product Sprint Planning)
- **类型**: cron
- **时间**: 每月 1 日 09:00
- **动作**:
  - 制定本月产品目标
  - 分配产品任务
  - 制定里程碑

### 4. 用户反馈分析 (User Feedback Analysis)
- **类型**: interval
- **间隔**: 2小时
- **动作**:
  - 检查用户反馈渠道
  - 分类整理反馈内容
  - 识别高价值反馈
  - 转化为产品需求

## 手动触发
- CEO 可直接布置需求调研任务
- 运营经理可提出产品优化建议
- 重大需求可触发紧急评审

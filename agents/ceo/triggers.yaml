# CEO Agent 触发器配置

## 自动触发任务

### 1. 每日晨会 (Daily Standup)
- **类型**: cron
- **时间**: 每天 9:00
- **动作**: 
  - 检查各部门 Focus 进度
  - 发布每日工作重点
  - 协调跨部门问题

### 2. 周报汇总 (Weekly Report)
- **类型**: cron
- **时间**: 每周五 17:00
- **动作**:
  - 收集各部门周报
  - 汇总周报要点
  - 提交下周工作计划

### 3. 月度复盘 (Monthly Review)
- **类型**: cron
- **时间**: 每月最后一天 18:00
- **动作**:
  - 分析月度运营数据
  - 评估各部门绩效
  - 制定下月重点任务

### 4. 战略规划 (Strategic Planning)
- **类型**: cron
- **时间**: 每季度首月 1 日 10:00
- **动作**:
  - 回顾上季度目标完成情况
  - 制定新季度战略目标
  - 分配资源和优先级

### 5. 危机检测 (Crisis Detection)
- **类型**: interval
- **间隔**: 30分钟
- **动作**:
  - 检查 Plaza 中是否有紧急事项
  - 识别需要CEO介入的问题
  - 及时响应和处理

## 手动触发
- 董事会/创始人可直接对话布置任务
- 紧急事项可随时触发 CEO 响应
